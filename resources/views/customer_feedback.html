<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Feedback - Nexus Enterprise</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --primary: #0f172a;
            --primary-light: #334155;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .feedback-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            overflow: hidden;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-logo {
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .context-badge {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .context-icon {
            background: #e2e8f0;
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .context-info h6 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary);
        }

        .context-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Clean Experience Rating Options */
        .rating-wrapper {
            margin-bottom: 30px;
        }

        .exp-options {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .exp-btn {
            flex: 1;
            background: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .exp-btn i {
            transition: transform 0.2s ease;
        }

        .exp-btn:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
            transform: translateY(-2px);
            color: var(--primary-light);
        }

        .exp-btn:hover i {
            transform: scale(1.1);
        }

        .exp-btn.selected {
            border-color: var(--accent);
            background: #eff6ff;
            color: var(--accent);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .exp-btn.selected i {
            transform: scale(1.15);
        }

        .exp-btn span {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Tags */
        .tags-section {
            display: none;
            margin-bottom: 30px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .feedback-tag {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 50px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .feedback-tag:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .feedback-tag.selected {
            background: #eff6ff;
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* Form Controls */
        .form-label {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: block;
        }

        .custom-input {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
            padding: 15px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            resize: none;
            width: 100%;
        }

        .custom-input:focus {
            background-color: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            outline: none;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            color: white;
        }

        /* Success Screen */
        #successScreen {
            display: none;
            text-align: center;
            padding: 40px 10px;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--success);
            margin-bottom: 20px;
            display: inline-block;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="feedback-card">
        
        <!-- Main Form Area -->
        <div id="feedbackFormArea">
            <div class="brand-header">
                <div class="brand-logo">NEXUS ENTERPRISE</div>
                <p class="text-muted small mb-0 mt-1">Service Quality Assessment</p>
            </div>

            <!-- Dynamic Context (Populated by session/URL) -->
            <div class="context-badge">
                <div class="context-icon">
                    <i class="bi bi-person-workspace"></i>
                </div>
                <div class="context-info">
                    <h6>Counter 02</h6>
                    <p>Assisted by <strong>Alex D.</strong></p>
                </div>
            </div>

            <form id="customerFeedbackForm">
                
                <div class="rating-wrapper" id="ratingSection">
                    <label class="form-label text-center" style="font-size: 1.1rem;">How was your experience today?</label>
                    
                    <!-- Clean Rating Options -->
                    <div class="exp-options" id="expGroup">
                        <button type="button" class="exp-btn" data-rating="Poor">
                            <i class="bi bi-emoji-frown fs-1 mb-2"></i>
                            <span>Poor</span>
                        </button>
                        <button type="button" class="exp-btn" data-rating="Average">
                            <i class="bi bi-emoji-neutral fs-1 mb-2"></i>
                            <span>Average</span>
                        </button>
                        <button type="button" class="exp-btn" data-rating="Excellent">
                            <i class="bi bi-emoji-smile fs-1 mb-2"></i>
                            <span>Excellent</span>
                        </button>
                    </div>
                    
                    <!-- Error Message -->
                    <div id="ratingError" class="text-danger small mt-2 text-center d-none fw-medium">
                        <i class="bi bi-exclamation-circle-fill me-1"></i> Please select your experience level.
                    </div>
                </div>

                <div class="tags-section" id="tagsSection">
                    <label class="form-label">What stood out to you? <span class="text-muted fw-normal">(Optional)</span></label>
                    <div class="tag-container">
                        <div class="feedback-tag" data-value="expertise">Technical Expertise</div>
                        <div class="feedback-tag" data-value="speed">Resolution Speed</div>
                        <div class="feedback-tag" data-value="friendly">Friendly Staff</div>
                        <div class="feedback-tag" data-value="communication">Clear Communication</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="customerComments" class="form-label">Additional Comments <span class="text-muted fw-normal">(Optional)</span></label>
                    <textarea class="form-control custom-input" id="customerComments" rows="3" placeholder="Tell us more about your experience..."></textarea>
                </div>

                <button type="submit" class="btn btn-submit" id="submitBtn">
                    Submit Feedback
                </button>
            </form>
        </div>

        <!-- Success Screen -->
        <div id="successScreen">
            <i class="bi bi-check-circle-fill success-icon"></i>
            <h2 class="fw-bold mb-3" style="color: var(--primary);">Thank You!</h2>
            <p class="text-muted mb-4 fs-5">Your feedback has been securely submitted and helps us maintain excellence.</p>
            <button class="btn btn-outline-secondary w-100 py-3" onclick="location.reload()" style="border-radius: 12px; font-weight: 600;">
                Return Home
            </button>
        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script>
        $(document).ready(function() {
            let currentRating = "";
            let selectedTags = [];

            // Experience Button Selection
            $('.exp-btn').on('click', function() {
                // Remove selection from all
                $('.exp-btn').removeClass('selected');
                
                // Add selection to clicked
                $(this).addClass('selected');
                currentRating = $(this).data('rating');
                
                // Hide errors
                $('#ratingError').addClass('d-none');
                
                // Reveal tags section smoothly
                $('#tagsSection').slideDown(300);
            });

            // Tag Toggle Logic
            $('.feedback-tag').on('click', function() {
                $(this).toggleClass('selected');
                const val = $(this).data('value');
                
                if ($(this).hasClass('selected')) {
                    selectedTags.push(val);
                } else {
                    selectedTags = selectedTags.filter(t => t !== val);
                }
            });

            // Form Submission
            $('#customerFeedbackForm').on('submit', function(e) {
                e.preventDefault();

                // Validation
                if (currentRating === "") {
                    $('#ratingError').removeClass('d-none');
                    $('#ratingSection').addClass('shake');
                    setTimeout(() => $('#ratingSection').removeClass('shake'), 400);
                    return;
                }

                const btn = $('#submitBtn');
                
                // Loading State
                btn.prop('disabled', true).html(
                    '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Sending...'
                );

                // Simulation payload
                const payload = {
                    counter: 'Counter 02',
                    staff: 'Alex D.',
                    rating: currentRating,
                    tags: selectedTags,
                    comments: $('#customerComments').val()
                };
                
                // console.log("Feedback Submitted:", payload);

                // Simulate Network Request
                setTimeout(function() {
                    $('#feedbackFormArea').fadeOut(300, function() {
                        $('#successScreen').fadeIn(400);
                    });
                }, 1200);
            });
        });
    </script>
</body>
</html>
